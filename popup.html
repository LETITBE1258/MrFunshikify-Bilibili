<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 15px 0;
      color: #333;
      text-align: center;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
    }
    .toggle-label {
      margin-right: 10px;
      font-size: 14px;
      color: #555;
    }
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 26px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 26px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #00a1d6;
    }
    input:checked + .slider:before {
      transform: translateX(24px);
    }
    .status {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }
    .options-link {
      display: block;
      text-align: center;
      font-size: 12px;
      color: #00a1d6;
      text-decoration: none;
      padding: 6px;
      border-radius: 6px;
      background: #f0f8fc;
    }
    .options-link:hover {
      background: #dff0f8;
    }
  </style>
</head>
<body>
  <h1>MrFunshikify Bilibili</h1>
  <div class="toggle-container">
    <span class="toggle-label">启用</span>
    <label class="toggle-switch">
      <input type="checkbox" id="toggleSwitch">
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status">已启用</div>
  <a class="options-link" id="optionsLink" href="#">设置 (Appearance Probability / Sticker Size)</a>
  <script src="popup.js"></script>
</body>
</html>
