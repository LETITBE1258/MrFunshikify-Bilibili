<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MrFunshikify 设置</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 580px;
      width: 100%;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
      font-size: 15px;
      margin-bottom: 16px;
      color: #666;
      font-weight: 600;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .row+.row {
      border-top: 1px solid #f0f0f0;
    }

    .label {
      font-size: 14px;
    }

    .value {
      font-size: 14px;
      color: #888;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      transition: 0.25s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.25s;
    }

    input:checked+.slider {
      background: #00a1d6;
    }

    input:checked+.slider::before {
      transform: translateX(20px);
    }

    .range-group {
      margin-bottom: 18px;
    }

    .range-group:last-child {
      margin-bottom: 0;
    }

    .range-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .range-header .label {
      font-size: 14px;
    }

    .range-header .val {
      font-size: 14px;
      font-weight: 600;
      color: #00a1d6;
      min-width: 48px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #e0e0e0;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #00a1d6;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 161, 214, 0.3);
    }

    .hint {
      font-size: 12px;
      color: #aaa;
      margin-top: 6px;
      line-height: 1.5;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #00a1d6;
      text-align: center;
      padding: 12px 0 4px;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      text-align: center;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      margin-top: 24px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>
      <img src="images/icon.png" alt="icon">
      MrFunshikify Bilibili
    </h1>

    <div class="card">
      <div class="row">
        <span class="label">启用插件</span>
        <label class="switch">
          <input type="checkbox" id="toggleSwitch">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="card">
      <h2>封面设置</h2>

      <div class="range-group">
        <div class="range-header">
          <span class="label">出现概率</span>
          <span class="val" id="probVal">100%</span>
        </div>
        <input type="range" id="probability" min="0" max="100" value="100">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#bbb;margin-top:4px">
          <span>从不出现</span>
          <span>每次都出现</span>
        </div>
        <div class="hint">控制封面图片出现的频率。设为 50% 则只有一半的封面会被替换。</div>
      </div>

      <div class="range-group" style="margin-bottom:0">
        <div class="range-header">
          <span class="label">贴图大小</span>
          <span class="val" id="sizeVal">1.0x</span>
        </div>
        <input type="range" id="stickerSize" min="50" max="200" value="100">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#bbb;margin-top:4px">
          <span>0.5x 缩小</span>
          <span>2.0x 放大</span>
        </div>
        <div class="hint">调整贴图在封面上的显示尺寸。1.0x 为原始大小，小于 1.0 会缩小居中，大于 1.0 会放大裁切。</div>
      </div>
    </div>

    <div class="card">
      <h2>图片状态</h2>
      <div class="stat-number" id="imageCount">--</div>
      <div class="stat-label">张封面图片</div>
    </div>

    <div class="card">
      <h2>关于</h2>
      <div class="row"><span class="label">版本</span><span class="value" id="version">--</span></div>
      <div class="row"><span class="label">图片总数</span><span class="value" id="totalImages">--</span></div>
      <div class="row"><span class="label">扩展ID</span><span class="value" id="extId"
          style="font-size:12px;font-family:monospace">--</span></div>
      <div class="row">
        <span class="label">项目地址</span>
        <a href="https://github.com/LETITBE1258/MrFunshikify-Bilibili" target="_blank" class="value"
          style="color:#00a1d6;text-decoration:none">GitHub</a>
      </div>
      <div class="row">
        <span class="label">B站主页</span>
        <a href="https://space.bilibili.com/87809529" target="_blank" class="value"
          style="color:#00a1d6;text-decoration:none">顺其自燃</a>
      </div>
    </div>

    <div class="footer">
      图片在 images/ 文件夹
    </div>
  </div>

  <script src="options.js"></script>
</body>

</html>
